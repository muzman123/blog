<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f2f5;" />
      <stop offset="100%" style="stop-color:#e6e9ee;" />
    </linearGradient>
    <marker id="arrow-small" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d" />
    </marker>
  </defs>

  <rect width="400" height="250" fill="url(#bg-grad)"/>
  
  <text x="200" y="20" font-family="'Droid Sans', sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212529">AB-MCTS: Wider vs. Deeper Search</text>

  <!-- Root Node -->
  <circle cx="50" cy="125" r="12" fill="#667eea"/>
  <text x="50" y="150" font-family="sans-serif" font-size="8" text-anchor="middle" fill="#495057">Start</text>

  <!-- Wider Path -->
  <path d="M 62 120 Q 100 80, 140 80" stroke="#adb5bd" stroke-width="1.5" fill="none" stroke-dasharray="3,3" marker-end="url(#arrow-small)"/>
  <circle cx="140" cy="80" r="8" fill="#ced4da"/>
  <path d="M 62 128 Q 100 128, 140 128" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-small)"/>
  <circle cx="140" cy="128" r="10" fill="#34d399"/>
  <path d="M 62 130 Q 100 170, 140 170" stroke="#adb5bd" stroke-width="1.5" fill="none" stroke-dasharray="3,3" marker-end="url(#arrow-small)"/>
  <circle cx="140" cy="170" r="8" fill="#ced4da"/>
  <text x="140" y="60" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#495057">Go Wider (Explore)</text>

  <!-- Deeper Path -->
  <path d="M 150 128 L 220 128" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-small)"/>
  <circle cx="220" cy="128" r="10" fill="#34d399"/>
  <text x="255" y="110" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#495057">Go Deeper (Refine)</text>

  <!-- Deeper Refinements -->
  <path d="M 230 128 L 270 128" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-small)"/>
  <circle cx="270" cy="128" r="10" fill="#34d399"/>
  <path d="M 280 128 L 320 128" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow-small)"/>
  <circle cx="320" cy="128" r="10" fill="#34d399"/>
  <circle cx="360" cy="128" r="12" fill="#10b981" stroke="white" stroke-width="1.5"/>
  <text x="340" y="150" font-family="sans-serif" font-size="8" text-anchor="middle" fill="#495057">Successful Result</text>

  <!-- Annotations -->
  <text x="100" y="195" font-family="sans-serif" font-size="9" fill="#6c757d">
    <tspan x="100" dy="1.2em">- Branch into diverse candidates.</tspan>
    <tspan x="100" dy="1.2em">- Some fail early (gray).</tspan>
  </text>

   <text x="270" y="195" font-family="sans-serif" font-size="9" fill="#047857">
    <tspan x="270" dy="1.2em">- Promising branch gets more compute.</tspan>
    <tspan x="270" dy="1.2em">- Refined until success.</tspan>
  </text>
</svg>
